<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNEAKER VAULT | Tienda Online</title>
    
    <meta property="og:title" content="Sneaker Vault - Catálogo Exclusivo">
    <meta property="og:description" content="Zapatillas premium con envío directo.">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --accent: #ff3e3e;
            --white: #ffffff;
            --gray: #111111;
            --success: #25d366;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), var(--bg)), 
                        url('https://images.unsplash.com/photo-1552346154-21d32810aba3?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            padding: 20px;
        }

        header h1 { 
            font-size: clamp(2.5rem, 10vw, 7rem); 
            font-weight: 900; 
            letter-spacing: -3px; 
            line-height: 0.9; 
        }

        header p {
            font-size: clamp(1rem, 3vw, 1.5rem);
            letter-spacing: 3px;
            margin-bottom: 15px;
        }

        /* ADMIN BUTTON (discreto) */
        .admin-link {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: #333;
            text-decoration: none;
            font-size: 0.8rem;
            opacity: 0.3;
            transition: 0.3s;
        }

        .admin-link:hover {
            opacity: 1;
            color: var(--accent);
        }

        /* GRID DE PRODUCTOS */
        #catalog-container { padding: 40px 5%; }
        .section-header { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-bottom: 40px; 
        }
        
        .section-header h2 {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            text-align: center;
        }
        
        #catalog {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--gray);
            border: 2px solid #222;
            border-radius: 15px;
            transition: 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover { 
            border-color: var(--white); 
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background-color: #1a1a1a;
        }

        .card-info { padding: 25px; }
        .card-name { 
            font-weight: 700; 
            font-size: clamp(1rem, 2.5vw, 1.3rem); 
            text-transform: uppercase; 
            margin-bottom: 10px;
        }
        .card-price { 
            color: var(--accent); 
            margin-bottom: 20px; 
            font-weight: bold; 
            font-size: clamp(1.2rem, 3vw, 1.5rem);
        }

        .btn-main {
            width: 100%;
            padding: 18px;
            background: var(--white);
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: 900;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-main:hover { 
            background: var(--accent); 
            color: white;
            transform: scale(1.02);
        }

        /* CARRITO LATERAL */
        #cart-drawer {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; max-width: 500px;
            height: 100%;
            background: #000;
            z-index: 2000;
            padding: 40px;
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            border-left: 2px solid #333;
            overflow-y: auto;
        }

        #cart-drawer.active { right: 0; }
        
        .cart-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 20px; 
            border-bottom: 2px solid #222; 
            padding-bottom: 15px;
            font-size: 1.1rem;
        }

        .cart-item-name {
            flex: 1;
            font-weight: bold;
        }

        .cart-item-size {
            color: #888;
            margin: 0 15px;
        }

        /* FLOATING CART BUTTON */
        .cart-trigger {
            position: fixed;
            bottom: 30px; right: 30px;
            background: var(--white);
            color: black;
            width: 70px; height: 70px;
            border-radius: 50%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            cursor: pointer; 
            z-index: 1500;
            font-weight: bold;
            font-size: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .cart-trigger:hover {
            transform: scale(1.1);
            background: var(--accent);
            color: white;
        }

        #cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* CART DRAWER STYLES */
        .cart-header {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .cart-total {
            font-size: 1.8rem; 
            font-weight: 900; 
            margin: 30px 0; 
            border-top: 3px solid white; 
            padding-top: 25px;
        }

        .btn-whatsapp {
            width: 100%;
            padding: 20px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        .btn-whatsapp:hover {
            background: #2ecc71;
            transform: scale(1.02);
        }

        .btn-close {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: #888;
            border: 2px solid #333;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-close:hover {
            background: #1a1a1a;
            color: white;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            header {
                height: 60vh;
            }

            .cart-trigger {
                width: 60px;
                height: 60px;
                bottom: 20px;
                right: 20px;
            }

            #cart-drawer {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <p>COLLECCIÓN 2026</p>
        <h1>SNEAKER<br>VAULT</h1>
    </header>

    <main id="catalog-container">
        <div class="section-header">
            <h2>👟 NUEVOS PRODUCTOS</h2>
        </div>
        <div id="catalog"></div>
    </main>

    <div id="cart-drawer">
        <h2 class="cart-header">🛒 MI SELECCIÓN</h2>
        <div id="cart-list"></div>
        <div id="cart-total" class="cart-total"></div>
        
        <button class="btn-whatsapp" onclick="sendOrder()">✅ FINALIZAR POR WHATSAPP</button>
        <button class="btn-close" onclick="toggleCart()">← VOLVER A LA TIENDA</button>
    </div>

    <div class="cart-trigger" onclick="toggleCart()">
        🛒
        <span id="cart-count">0</span>
    </div>

    <a href="login.html" class="admin-link">Admin</a>

    <script>
        // --- BASE DE DATOS LOCAL ---
        let products = JSON.parse(localStorage.getItem('vault_db')) || [
            { name: "Jordan 4 Retro Thunder", price: "950.000", img: "https://images.unsplash.com/photo-1597044753138-b7a26f6d3742" },
            { name: "Nike Dunk Low Panda", price: "520.000", img: "https://images.unsplash.com/photo-1600054800747-be294a6a0d26" }
        ];

        let cart = [];

        // --- RENDERIZADO ---
        function render() {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = '';
            
            if (products.length === 0) {
                catalog.innerHTML = '<p style="text-align: center; color: #666; font-size: 1.2rem; padding: 40px;">No hay productos disponibles en este momento.</p>';
                return;
            }
            
            products.forEach((p, i) => {
                catalog.innerHTML += `
                    <div class="card">
                        <img src="${p.img}" loading="lazy" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300x300?text=Sin+imagen'">
                        <div class="card-info">
                            <p class="card-name">${p.name}</p>
                            <p class="card-price">$${p.price}</p>
                            <button class="btn-main" onclick="addToCart(${i})">🛒 AGREGAR AL CARRITO</button>
                        </div>
                    </div>
                `;
            });
        }

        // --- CARRITO ---
        function addToCart(index) {
            const talla = prompt("¿Qué talla necesitas? (Ej: 40, 41, 42)");
            if(talla && talla.trim() !== '') {
                cart.push({...products[index], talla: talla.trim()});
                updateCartUI();
                toggleCart();
            }
        }

        function updateCartUI() {
            const list = document.getElementById('cart-list');
            const totalE = document.getElementById('cart-total');
            document.getElementById('cart-count').innerText = cart.length;
            
            list.innerHTML = '';
            let sum = 0;
            
            if (cart.length === 0) {
                list.innerHTML = '<p style="text-align: center; color: #666; padding: 40px 0;">Tu carrito está vacío</p>';
                totalE.innerText = '';
                return;
            }
            
            cart.forEach((item, i) => {
                list.innerHTML += `
                    <div class="cart-item">
                        <span class="cart-item-name">${item.name}</span>
                        <span class="cart-item-size">Talla: ${item.talla}</span>
                        <span>$${item.price}</span>
                    </div>
                `;
                sum += parseInt(item.price.replace(/\./g, ''));
            });
            totalE.innerText = "TOTAL: $" + sum.toLocaleString('es-CO');
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('active');
        }

        // --- WHATSAPP ---
        function sendOrder() {
            if(cart.length === 0) {
                alert('❌ Tu carrito está vacío. Agrega productos antes de finalizar.');
                return;
            }
            
            const nombre = prompt("👤 ¿Cuál es tu nombre completo?");
            if (!nombre) return;
            
            const ciudad = prompt("📍 ¿Ciudad y dirección de entrega?");
            if (!ciudad) return;
            
            let msg = `🔥 *NUEVO PEDIDO - SNEAKER VAULT* 🔥\n\n`;
            msg += `👤 *Cliente:* ${nombre}\n`;
            msg += `📍 *Destino:* ${ciudad}\n\n`;
            msg += `👟 *PRODUCTOS:*\n`;
            
            cart.forEach(item => {
                msg += `- ${item.name} | Talla: ${item.talla} | $${item.price}\n`;
            });

            let sum = 0;
            cart.forEach(item => {
                sum += parseInt(item.price.replace(/\./g, ''));
            });
            msg += `\n💰 *TOTAL: $${sum.toLocaleString('es-CO')}*`;

            const phone = "573100000000"; // <--- CAMBIA ESTE NÚMERO POR EL TUYO
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
        }

        // Inicializar
        render();
    </script>
</body>
</html>
