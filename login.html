<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrador - SNEAKER VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ff3e3e;
            --white: #ffffff;
            --gray: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--white); 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: var(--gray);
            padding: 40px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 2px solid #333;
        }

        .login-container h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .login-container p {
            color: #888;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: #ccc;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #ff5e5e;
            transform: scale(1.02);
        }

        .btn-back {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: #888;
            border: 2px solid #333;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
        }

        .btn-back:hover {
            background: #1a1a1a;
            color: white;
        }

        .error-message {
            color: var(--accent);
            margin-top: 15px;
            font-size: 1rem;
            display: none;
        }

        .setup-mode {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 10px;
        }

        .setup-mode p {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 ADMINISTRADOR</h1>
        <p>Ingresa tu contraseña para acceder</p>
        
        <div class="input-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" placeholder="••••••••" onkeypress="if(event.key === 'Enter') login()">
        </div>
        
        <button class="btn-login" onclick="login()">INGRESAR</button>
        <button class="btn-back" onclick="goBack()">← VOLVER A LA TIENDA</button>
        
        <div class="error-message" id="error-message">
            ❌ Contraseña incorrecta
        </div>

        <div class="setup-mode" id="setup-mode">
            <p>Es la primera vez que ingresas. Crea una contraseña de administrador:</p>
            <div class="input-group">
                <label for="new-password">Nueva contraseña:</label>
                <input type="password" id="new-password" placeholder="••••••••">
            </div>
            <div class="input-group">
                <label for="confirm-password">Confirmar contraseña:</label>
                <input type="password" id="confirm-password" placeholder="••••••••">
            </div>
            <button class="btn-login" onclick="setupPassword()">CREAR CONTRASEÑA</button>
        </div>
    </div>

    <script>
        // Verificar si ya existe una contraseña
        const storedPassword = localStorage.getItem('admin_password');
        
        if (!storedPassword) {
            document.getElementById('password').style.display = 'none';
            document.querySelector('.input-group label').style.display = 'none';
            document.querySelector('.btn-login').style.display = 'none';
            document.getElementById('setup-mode').style.display = 'block';
            document.querySelector('p').textContent = 'Configuración inicial de administrador';
        }

        function login() {
            const password = document.getElementById('password').value;
            const storedPassword = localStorage.getItem('admin_password');
            
            if (password === storedPassword) {
                localStorage.setItem('admin_logged_in', 'true');
                window.location.href = 'admin.html';
            } else {
                document.getElementById('error-message').style.display = 'block';
                document.getElementById('password').value = '';
                setTimeout(() => {
                    document.getElementById('error-message').style.display = 'none';
                }, 3000);
            }
        }

        function setupPassword() {
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;
            
            if (newPass.length < 4) {
                alert('La contraseña debe tener al menos 4 caracteres');
                return;
            }
            
            if (newPass !== confirmPass) {
                alert('Las contraseñas no coinciden');
                return;
            }
            
            localStorage.setItem('admin_password', newPass);
            alert('¡Contraseña creada exitosamente! Ahora puedes ingresar.');
            location.reload();
        }

        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
