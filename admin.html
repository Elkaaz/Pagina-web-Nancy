<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - SNEAKER VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ff3e3e;
            --white: #ffffff;
            --gray: #111111;
            --success: #25d366;
            --danger: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--white); 
            font-family: 'Inter', sans-serif; 
            padding: 20px;
        }

        /* HEADER */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid #333;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .admin-header h1 {
            font-size: 2rem;
            color: var(--accent);
        }

        .header-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-header {
            padding: 12px 25px;
            background: #333;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-header:hover {
            background: #555;
        }

        .btn-logout {
            background: var(--danger);
        }

        .btn-logout:hover {
            background: #ff4444;
        }

        /* FORMULARIO AGREGAR PRODUCTO */
        .add-product-section {
            background: var(--gray);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 40px;
            border: 2px solid #333;
        }

        .add-product-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: #ccc;
        }

        .form-group input {
            padding: 15px;
            font-size: 1.1rem;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 10px;
            color: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-add {
            padding: 18px 40px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add:hover {
            background: #2ecc71;
            transform: scale(1.02);
        }

        /* LISTA DE PRODUCTOS */
        .products-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--gray);
            border: 2px solid #333;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .product-card:hover {
            border-color: var(--white);
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #1a1a1a;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 1.3rem;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .btn-delete {
            flex: 1;
            padding: 12px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #ff4444;
        }

        .btn-edit {
            flex: 1;
            padding: 12px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-edit:hover {
            background: #555;
        }

        /* MENSAJE VACÍO */
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 1.2rem;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                text-align: center;
            }

            .header-buttons {
                width: 100%;
                justify-content: center;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .btn-add {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>🔧 PANEL ADMINISTRADOR</h1>
        <div class="header-buttons">
            <button class="btn-header" onclick="showTokenSetup()">⚙️ CONFIGURAR GITHUB</button>
            <button class="btn-header" onclick="saveToGitHub()">� GUARDAR EN GITHUB</button>
            <button class="btn-header" onclick="viewStore()">👁️ VER TIENDA</button>
            <button class="btn-header btn-logout" onclick="logout()">🚪 CERRAR SESIÓN</button>
        </div>
    </div>

    <div class="add-product-section">
        <h2>➕ AGREGAR NUEVO PRODUCTO</h2>
        <div class="form-grid">
            <div class="form-group">
                <label for="product-name">Nombre del producto:</label>
                <input type="text" id="product-name" placeholder="Ej: Nike Air Jordan 1">
            </div>
            <div class="form-group">
                <label for="product-price">Precio:</label>
                <input type="text" id="product-price" placeholder="Ej: 450.000">
            </div>
            <div class="form-group">
                <label for="product-image">URL de la imagen:</label>
                <input type="text" id="product-image" placeholder="https://ejemplo.com/imagen.jpg">
            </div>
        </div>
        <button class="btn-add" onclick="addProduct()">GUARDAR PRODUCTO</button>
    </div>

    <div class="products-section">
        <h2>📦 PRODUCTOS EN CATÁLOGO (<span id="product-count">0</span>)</h2>
        <div class="products-grid" id="products-grid"></div>
    </div>

    <script>
        // Verificar autenticación
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }

        // Cargar productos desde archivo JSON
        let products = [];

        async function loadProducts() {
            try {
                const response = await fetch('productos.json');
                products = await response.json();
                renderProducts();
            } catch (error) {
                console.error('Error al cargar productos:', error);
                products = [];
                renderProducts();
            }
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const count = document.getElementById('product-count');
            
            count.textContent = products.length;
            
            if (products.length === 0) {
                grid.innerHTML = '<div class="empty-message">No hay productos en el catálogo. Agrega el primero arriba.</div>';
                return;
            }

            grid.innerHTML = '';
            products.forEach((product, index) => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${product.img}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/300x250?text=Sin+imagen'">
                        <div class="product-info">
                            <div class="product-name">${product.name}</div>
                            <div class="product-price">$${product.price}</div>
                            <div class="product-actions">
                                <button class="btn-edit" onclick="editProduct(${index})">✏️ EDITAR</button>
                                <button class="btn-delete" onclick="deleteProduct(${index})">🗑️ ELIMINAR</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function addProduct() {
            const name = document.getElementById('product-name').value.trim();
            const price = document.getElementById('product-price').value.trim();
            const image = document.getElementById('product-image').value.trim();

            if (!name || !price || !image) {
                alert('⚠️ Por favor completa todos los campos');
                return;
            }

            products.push({ name, price, img: image });
            
            // Limpiar formulario
            document.getElementById('product-name').value = '';
            document.getElementById('product-price').value = '';
            document.getElementById('product-image').value = '';
            
            renderProducts();
            alert('✅ Producto agregado. Recuerda EXPORTAR DATOS y subir el archivo a GitHub para que los clientes vean los cambios.');
        }

        function deleteProduct(index) {
            if (confirm('¿Estás seguro de que quieres eliminar este producto?')) {
                products.splice(index, 1);
                renderProducts();
                alert('✅ Producto eliminado. Recuerda EXPORTAR DATOS y subir el archivo a GitHub para que los clientes vean los cambios.');
            }
        }

        function editProduct(index) {
            const product = products[index];
            const newName = prompt('Nombre del producto:', product.name);
            const newPrice = prompt('Precio:', product.price);
            const newImage = prompt('URL de la imagen:', product.img);

            if (newName && newPrice && newImage) {
                products[index] = { name: newName, price: newPrice, img: newImage };
                renderProducts();
                alert('✅ Producto actualizado. Recuerda EXPORTAR DATOS y subir el archivo a GitHub para que los clientes vean los cambios.');
            }
        }

        function viewStore() {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'login.html';
        }

        function exportProducts() {
            const dataStr = JSON.stringify(products, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'productos_nancy_sneakers.json';
            link.click();
            URL.revokeObjectURL(url);
            alert('✅ Datos exportados exitosamente. Guarda el archivo en tu computadora.');
        }

        function showTokenSetup() {
            const savedToken = localStorage.getItem('github_token');
            const tokenInput = prompt(
                '⚙️ CONFIGURACIÓN DE GITHUB\n\n' +
                'Para guardar cambios automáticamente, necesitas un token de GitHub.\n\n' +
                '📋 PASOS PARA CREAR EL TOKEN (solo una vez):\n' +
                '1. Ve a: https://github.com/settings/tokens\n' +
                '2. Haz clic en "Generate new token" (classic)\n' +
                '3. Escribe un nombre (ej: Nancy Sneakers)\n' +
                '4. Marca la casilla "repo" (para tener acceso completo)\n' +
                '5. Haz clic en "Generate token"\n' +
                '6. Copia el token que aparece (empieza con ghp_)\n\n' +
                'Token actual: ' + (savedToken ? '✅ Ya configurado' : '❌ No configurado') + '\n\n' +
                'Pega tu token aquí (o deja vacío para cancelar):',
                savedToken || ''
            );
            
            if (tokenInput && tokenInput.trim()) {
                localStorage.setItem('github_token', tokenInput.trim());
                alert('✅ Token guardado exitosamente. Ahora puedes usar "Guardar en GitHub".');
            }
        }

        async function saveToGitHub() {
            const token = localStorage.getItem('github_token');
            
            if (!token) {
                alert('❌ Primero debes configurar el token de GitHub.\n\nHaz clic en "⚙️ CONFIGURAR GITHUB" y sigue las instrucciones.');
                return;
            }

            const confirmSave = confirm('¿Estás seguro de guardar los cambios en GitHub?\n\nEsto actualizará los productos para todos los clientes.');
            if (!confirmSave) return;

            try {
                const content = JSON.stringify(products, null, 2);
                const message = 'Actualizar productos desde panel de administración';
                
                // Primero obtener el archivo actual para obtener el SHA
                const getFileResponse = await fetch('https://api.github.com/repos/Elkaaz/Pagina-web-Nancy/contents/productos.json', {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                let sha = null;
                if (getFileResponse.ok) {
                    const fileData = await getFileResponse.json();
                    sha = fileData.sha;
                }

                // Actualizar o crear el archivo
                const response = await fetch('https://api.github.com/repos/Elkaaz/Pagina-web-Nancy/contents/productos.json', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: message,
                        content: btoa(content),
                        sha: sha
                    })
                });

                if (response.ok) {
                    alert('✅ Cambios guardados exitosamente en GitHub.\n\nLos clientes verán los cambios en 1-2 minutos.');
                } else {
                    const error = await response.json();
                    alert('❌ Error al guardar en GitHub: ' + (error.message || 'Error desconocido'));
                }
            } catch (error) {
                alert('❌ Error de conexión: ' + error.message);
            }
        }

        // Renderizar productos al cargar
        renderProducts();
    </script>
</body>
</html>
