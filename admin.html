<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - SNEAKER VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ff3e3e;
            --white: #ffffff;
            --gray: #111111;
            --success: #25d366;
            --danger: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--white); 
            font-family: 'Inter', sans-serif; 
            padding: 20px;
        }

        /* HEADER */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid #333;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .admin-header h1 {
            font-size: 2rem;
            color: var(--accent);
        }

        .header-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-header {
            padding: 12px 25px;
            background: #333;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-header:hover {
            background: #555;
        }

        .btn-logout {
            background: var(--danger);
        }

        .btn-logout:hover {
            background: #ff4444;
        }

        /* FORMULARIO AGREGAR PRODUCTO */
        .add-product-section {
            background: var(--gray);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 40px;
            border: 2px solid #333;
        }

        .add-product-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: #ccc;
        }

        .form-group input {
            padding: 15px;
            font-size: 1.1rem;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 10px;
            color: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-add {
            padding: 18px 40px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add:hover {
            background: #2ecc71;
            transform: scale(1.02);
        }

        /* LISTA DE PRODUCTOS */
        .products-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--gray);
            border: 2px solid #333;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .product-card:hover {
            border-color: var(--white);
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #1a1a1a;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 1.3rem;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .btn-delete {
            flex: 1;
            padding: 12px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #ff4444;
        }

        .btn-edit {
            flex: 1;
            padding: 12px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-edit:hover {
            background: #555;
        }

        /* MENSAJE VACÍO */
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 1.2rem;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                text-align: center;
            }

            .header-buttons {
                width: 100%;
                justify-content: center;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .btn-add {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>🔧 PANEL ADMINISTRADOR</h1>
        <div class="header-buttons">
            <button class="btn-header" onclick="showSection('products')">📦 PRODUCTOS</button>
            <button class="btn-header" onclick="showSection('settings')">⚙️ CONFIGURACIÓN</button>
            <button class="btn-header" onclick="showSection('orders')">📋 ÓRDENES</button>
            <button class="btn-header" onclick="viewStore()">👁️ VER TIENDA</button>
            <button class="btn-header btn-logout" onclick="logout()">🚪 CERRAR SESIÓN</button>
        </div>
    </div>

    <!-- SECCIÓN PRODUCTOS -->
    <div id="section-products">
        <div class="add-product-section">
            <h2>➕ AGREGAR NUEVO PRODUCTO</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="product-name">Nombre del producto:</label>
                    <input type="text" id="product-name" placeholder="Ej: Nike Air Jordan 1">
                </div>
                <div class="form-group">
                    <label for="product-price">Precio:</label>
                    <input type="text" id="product-price" placeholder="Ej: 450.000">
                </div>
                <div class="form-group">
                    <label for="product-image">📷 Foto del producto:</label>
                    <input type="file" id="product-image" accept="image/*" capture="environment" onchange="previewImage(event)">
                    <div id="image-preview" style="margin-top: 10px; max-width: 200px; display: none;">
                        <img id="preview-img" style="width: 100%; border-radius: 10px;">
                    </div>
                </div>
            </div>
            <button class="btn-add" onclick="addProduct()">GUARDAR PRODUCTO</button>
        </div>

        <div class="products-section">
            <h2>📦 PRODUCTOS EN CATÁLOGO (<span id="product-count">0</span>)</h2>
            <div class="products-grid" id="products-grid"></div>
        </div>
    </div>

    <!-- SECCIÓN CONFIGURACIÓN -->
    <div id="section-settings" style="display: none;">
        <div class="add-product-section">
            <h2>⚙️ CONFIGURACIÓN DEL SITIO</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="setting-phone">📞 Teléfono:</label>
                    <input type="text" id="setting-phone" placeholder="573100000000">
                </div>
                <div class="form-group">
                    <label for="setting-whatsapp">💬 WhatsApp:</label>
                    <input type="text" id="setting-whatsapp" placeholder="573100000000">
                </div>
                <div class="form-group">
                    <label for="setting-instagram">📸 Instagram:</label>
                    <input type="text" id="setting-instagram" placeholder="@nancy_sneakers">
                </div>
                <div class="form-group">
                    <label for="setting-facebook">📘 Facebook:</label>
                    <input type="text" id="setting-facebook" placeholder="Nancy Sneakers">
                </div>
                <div class="form-group">
                    <label for="setting-email">📧 Email:</label>
                    <input type="text" id="setting-email" placeholder="ventas@nancysneakers.com">
                </div>
                <div class="form-group">
                    <label for="setting-address">📍 Dirección:</label>
                    <input type="text" id="setting-address" placeholder="Calle Principal #123, Colombia">
                </div>
                <div class="form-group">
                    <label for="setting-welcome">👋 Texto de bienvenida:</label>
                    <input type="text" id="setting-welcome" placeholder="Bienvenidos a Nancy Sneakers">
                </div>
                <div class="form-group">
                    <label for="setting-shipping">🚚 Costo base de envío:</label>
                    <input type="text" id="setting-shipping" placeholder="15000">
                </div>
            </div>
            <button class="btn-add" onclick="saveSettings()">GUARDAR CONFIGURACIÓN</button>
        </div>
    </div>

    <!-- SECCIÓN ÓRDENES -->
    <div id="section-orders" style="display: none;">
        <div class="products-section">
            <h2>📋 ÓRDENES DE CLIENTES</h2>
            <div id="orders-grid"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN SUPABASE ---
        const SUPABASE_URL = 'https://upoggoaofzzxpjwvdoii.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_gS37Hx8qTy7jLR_S-YBd1A_-Frir6CZ';

        // Verificar autenticación
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }

        // Cargar productos desde Supabase
        let products = [];

        async function loadProducts() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/products`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                products = await response.json();
                renderProducts();
            } catch (error) {
                console.error('Error al cargar productos:', error);
                products = [];
                renderProducts();
            }
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const count = document.getElementById('product-count');
            
            count.textContent = products.length;
            
            if (products.length === 0) {
                grid.innerHTML = '<div class="empty-message">No hay productos en el catálogo. Agrega el primero arriba.</div>';
                return;
            }

            grid.innerHTML = '';
            products.forEach((product) => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${product.img}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/300x250?text=Sin+imagen'">
                        <div class="product-info">
                            <div class="product-name">${product.name}</div>
                            <div class="product-price">$${product.price}</div>
                            <div class="product-actions">
                                <button class="btn-edit" onclick="editProduct(${product.id})">✏️ EDITAR</button>
                                <button class="btn-delete" onclick="deleteProduct(${product.id})">🗑️ ELIMINAR</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        async function addProduct() {
            const name = document.getElementById('product-name').value.trim();
            const price = document.getElementById('product-price').value.trim();
            const imageInput = document.getElementById('product-image');

            if (!name || !price) {
                alert('⚠️ Por favor completa el nombre y el precio');
                return;
            }

            if (!imageInput.files || imageInput.files.length === 0) {
                alert('⚠️ Por favor toma o selecciona una foto del producto');
                return;
            }

            try {
                // Subir imagen a Supabase Storage
                const imageUrl = await uploadImageToSupabase(imageInput.files[0]);

                // Guardar producto en la base de datos
                const response = await fetch(`${SUPABASE_URL}/rest/v1/products`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, price, img: imageUrl })
                });

                if (response.ok) {
                    // Limpiar formulario
                    document.getElementById('product-name').value = '';
                    document.getElementById('product-price').value = '';
                    document.getElementById('product-image').value = '';
                    document.getElementById('image-preview').style.display = 'none';
                    
                    await loadProducts();
                    alert('✅ Producto agregado exitosamente. Los cambios son inmediatos para todos los clientes.');
                } else {
                    alert('❌ Error al agregar producto');
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        async function deleteProduct(id) {
            if (confirm('¿Estás seguro de que quieres eliminar este producto?')) {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, {
                        method: 'DELETE',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    });

                    if (response.ok) {
                        await loadProducts();
                        alert('✅ Producto eliminado exitosamente. Los cambios son inmediatos para todos los clientes.');
                    } else {
                        alert('❌ Error al eliminar producto');
                    }
                } catch (error) {
                    alert('❌ Error de conexión: ' + error.message);
                }
            }
        }

        async function editProduct(id) {
            const product = products.find(p => p.id === id);
            const newName = prompt('Nombre del producto:', product.name);
            const newPrice = prompt('Precio:', product.price);
            const newImage = prompt('URL de la imagen:', product.img);

            if (newName && newPrice && newImage) {
                try {
                    const response = await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ name: newName, price: newPrice, img: newImage })
                    });

                    if (response.ok) {
                        await loadProducts();
                        alert('✅ Producto actualizado exitosamente. Los cambios son inmediatos para todos los clientes.');
                    } else {
                        alert('❌ Error al actualizar producto');
                    }
                } catch (error) {
                    alert('❌ Error de conexión: ' + error.message);
                }
            }
        }

        function viewStore() {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'login.html';
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('image-preview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        async function uploadImageToSupabase(file) {
            const fileName = `${Date.now()}_${file.name}`;
            const filePath = `products/${fileName}`;

            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch(`${SUPABASE_URL}/storage/v1/object/${filePath}`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'multipart/form-data'
                },
                body: formData
            });

            if (!response.ok) {
                throw new Error('Error al subir imagen');
            }

            // Retornar la URL pública de la imagen
            return `${SUPABASE_URL}/storage/v1/object/public/${filePath}`;
        }

        function showSection(section) {
            document.getElementById('section-products').style.display = section === 'products' ? 'block' : 'none';
            document.getElementById('section-settings').style.display = section === 'settings' ? 'block' : 'none';
            document.getElementById('section-orders').style.display = section === 'orders' ? 'block' : 'none';
            
            if (section === 'settings') loadSettings();
            if (section === 'orders') loadOrders();
        }

        async function loadSettings() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/settings`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                const settings = await response.json();
                
                settings.forEach(setting => {
                    const input = document.getElementById(`setting-${setting.key}`);
                    if (input) input.value = setting.value;
                });
            } catch (error) {
                console.error('Error al cargar configuración:', error);
            }
        }

        async function saveSettings() {
            const settings = [
                { key: 'phone', value: document.getElementById('setting-phone').value },
                { key: 'whatsapp', value: document.getElementById('setting-whatsapp').value },
                { key: 'instagram', value: document.getElementById('setting-instagram').value },
                { key: 'facebook', value: document.getElementById('setting-facebook').value },
                { key: 'email', value: document.getElementById('setting-email').value },
                { key: 'address', value: document.getElementById('setting-address').value },
                { key: 'welcome_text', value: document.getElementById('setting-welcome').value },
                { key: 'shipping_base', value: document.getElementById('setting-shipping').value }
            ];

            try {
                for (const setting of settings) {
                    await fetch(`${SUPABASE_URL}/rest/v1/settings?key=eq.${setting.key}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ value: setting.value })
                    });
                }
                alert('✅ Configuración guardada exitosamente');
            } catch (error) {
                alert('❌ Error al guardar configuración: ' + error.message);
            }
        }

        async function loadOrders() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/orders?order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                const orders = await response.json();
                
                const grid = document.getElementById('orders-grid');
                if (orders.length === 0) {
                    grid.innerHTML = '<div class="empty-message">No hay órdenes aún.</div>';
                    return;
                }

                grid.innerHTML = orders.map(order => `
                    <div class="product-card" style="padding: 20px;">
                        <div class="product-name">Orden #${order.id}</div>
                        <div style="margin: 10px 0; color: #888;">${new Date(order.created_at).toLocaleString()}</div>
                        <div style="margin: 5px 0;"><strong>Cliente:</strong> ${order.customer_name}</div>
                        <div style="margin: 5px 0;"><strong>Teléfono:</strong> ${order.customer_phone}</div>
                        <div style="margin: 5px 0;"><strong>Dirección:</strong> ${order.customer_address}, ${order.customer_city}</div>
                        <div style="margin: 5px 0;"><strong>Envío:</strong> ${order.shipping_company} - $${order.shipping_cost}</div>
                        <div style="margin: 5px 0;"><strong>Total:</strong> $${order.total}</div>
                        <div style="margin: 5px 0;"><strong>Estado:</strong> ${order.status}</div>
                        <div style="margin: 5px 0;"><strong>Pago:</strong> ${order.payment_status}</div>
                        <div class="product-actions" style="margin-top: 15px;">
                            <button class="btn-edit" onclick="updateOrderStatus(${order.id}, 'completed')">✅ Completar</button>
                            <button class="btn-delete" onclick="updateOrderStatus(${order.id}, 'cancelled')">❌ Cancelar</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error al cargar órdenes:', error);
            }
        }

        async function updateOrderStatus(orderId, status) {
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${orderId}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status })
                });
                loadOrders();
                alert('✅ Estado de la orden actualizado');
            } catch (error) {
                alert('❌ Error al actualizar orden: ' + error.message);
            }
        }

        // Renderizar productos al cargar
        loadProducts();
    </script>
</body>
</html>
