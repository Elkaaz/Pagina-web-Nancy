<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - SNEAKER VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ff3e3e;
            --white: #ffffff;
            --gray: #111111;
            --success: #25d366;
            --danger: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--white); 
            font-family: 'Inter', sans-serif; 
            padding: 20px;
        }

        /* HEADER */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid #333;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .admin-header h1 {
            font-size: 2rem;
            color: var(--accent);
        }

        .header-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-header {
            padding: 12px 25px;
            background: #333;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-header:hover {
            background: #555;
        }

        .btn-logout {
            background: var(--danger);
        }

        .btn-logout:hover {
            background: #ff4444;
        }

        /* FORMULARIO AGREGAR PRODUCTO */
        .add-product-section {
            background: var(--gray);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 40px;
            border: 2px solid #333;
        }

        .add-product-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: #ccc;
        }

        .form-group input {
            padding: 15px;
            font-size: 1.1rem;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 10px;
            color: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-add {
            padding: 18px 40px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add:hover {
            background: #2ecc71;
            transform: scale(1.02);
        }

        /* LISTA DE PRODUCTOS */
        .products-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--gray);
            border: 2px solid #333;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .product-card:hover {
            border-color: var(--white);
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #1a1a1a;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 1.3rem;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .btn-delete {
            flex: 1;
            padding: 12px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #ff4444;
        }

        .btn-edit {
            flex: 1;
            padding: 12px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-edit:hover {
            background: #555;
        }

        /* MENSAJE VACÍO */
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 1.2rem;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                text-align: center;
            }

            .header-buttons {
                width: 100%;
                justify-content: center;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .btn-add {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>🔧 PANEL ADMINISTRADOR - Nancy's Sandals</h1>
        <div class="header-buttons">
            <button class="btn-header" onclick="showSection('products')">📦 INVENTARIO</button>
            <button class="btn-header" onclick="showSection('orders')">📋 PEDIDOS</button>
            <button class="btn-header" onclick="showSection('customers')">👥 CLIENTES</button>
            <button class="btn-header" onclick="showSection('dashboard')">📊 RESUMEN</button>
            <button class="btn-header" onclick="showSection('settings')">⚙️ CONFIGURACIÓN</button>
            <button class="btn-header" onclick="showSection('returns')">🔄 DEVOLUCIONES</button>
            <button class="btn-header" onclick="viewStore()">👁️ VER TIENDA</button>
            <button class="btn-header btn-logout" onclick="logout()">🚪 CERRAR SESIÓN</button>
        </div>
    </div>

    <!-- SECCIÓN PRODUCTOS -->
    <div id="section-products">
        <div class="add-product-section">
            <h2>➕ AGREGAR A TIENDA</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre del producto</label>
                    <input type="text" id="product-name" placeholder="Ej: Nike Air Max 270">
                </div>
                <div class="form-group">
                    <label>Precio (COP)</label>
                    <input type="number" id="product-price" placeholder="Ej: 450000">
                </div>
                <div class="form-group">
                    <label>URL de la imagen</label>
                    <input type="text" id="product-image" placeholder="https://ejemplo.com/imagen.jpg">
                </div>
                <div class="form-group">
                    <label>O tomar foto con cámara</label>
                    <input type="file" id="product-camera" accept="image/*" capture="environment" onchange="previewImage(event)">
                    <div id="image-preview" style="margin-top: 10px; max-width: 200px; display: none;">
                        <img id="preview-img" style="width: 100%; border-radius: 10px;">
                    </div>
                </div>
            </div>
            <button class="btn-add" onclick="addProduct()">AGREGAR PRODUCTO</button>
        </div>
        
        <div class="products-section">
            <h2>📦 INVENTARIO</h2>
            <div style="margin-bottom: 20px;">
                <input type="text" id="search-product" placeholder="🔍 Buscar producto..." onkeyup="searchProducts()" style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem;">
            </div>
            <div id="products-grid"></div>
        </div>
    </div>

    <!-- SECCIÓN CONFIGURACIÓN -->
    <div id="section-settings" style="display: none;">
        <div class="add-product-section">
            <h2>⚙️ CONFIGURACIÓN DEL SITIO</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="setting-phone">📞 Teléfono:</label>
                    <input type="text" id="setting-phone" placeholder="573100000000">
                </div>
                <div class="form-group">
                    <label for="setting-whatsapp">💬 WhatsApp:</label>
                    <input type="text" id="setting-whatsapp" placeholder="573100000000">
                </div>
                <div class="form-group">
                    <label for="setting-instagram">📸 Instagram:</label>
                    <input type="text" id="setting-instagram" placeholder="@nancy_sneakers">
                </div>
                <div class="form-group">
                    <label for="setting-facebook">📘 Facebook:</label>
                    <input type="text" id="setting-facebook" placeholder="Nancy Sneakers">
                </div>
                <div class="form-group">
                    <label for="setting-email">📧 Email:</label>
                    <input type="text" id="setting-email" placeholder="ventas@nancysneakers.com">
                </div>
                <div class="form-group">
                    <label for="setting-address">📍 Dirección:</label>
                    <input type="text" id="setting-address" placeholder="Calle Principal #123, Colombia">
                </div>
                <div class="form-group">
                    <label for="setting-welcome">👋 Texto de bienvenida:</label>
                    <input type="text" id="setting-welcome" placeholder="Bienvenidos a Nancy Sneakers">
                </div>
                <div class="form-group">
                    <label for="setting-shipping">🚚 Costo base de envío:</label>
                    <input type="text" id="setting-shipping" placeholder="15000">
                </div>
            </div>
            <button class="btn-add" onclick="saveSettings()">GUARDAR CONFIGURACIÓN</button>
        </div>
    </div>

    <!-- SECCIÓN ÓRDENES -->
    <div id="section-orders" style="display: none;">
        <div class="products-section">
            <h2>📋 ÓRDENES DE CLIENTES</h2>
            <div id="orders-grid"></div>
        </div>
    </div>

    <!-- SECCIÓN DEVOLUCIONES -->
    <div id="section-returns" style="display: none;">
        <div class="products-section">
            <h2>🔄 SOLICITUDES DE CAMBIO/DEVOLUCIÓN</h2>
            <div id="returns-grid"></div>
        </div>
    </div>

    <!-- SECCIÓN CLIENTES -->
    <div id="section-customers" style="display: none;">
        <div class="products-section">
            <h2>👥 BASE DE DATOS DE CLIENTES</h2>
            <div id="customers-grid"></div>
        </div>
    </div>

    <!-- SECCIÓN RESUMEN -->
    <div id="section-dashboard" style="display: none;">
        <div class="products-section">
            <h2>📊 RESUMEN DEL NEGOCIO</h2>
            <div id="dashboard-content"></div>
        </div>
    </div>

    <script>
        // Verificar autenticación
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }

        let products = JSON.parse(localStorage.getItem('products')) || [];

        function loadProducts() {
            products = JSON.parse(localStorage.getItem('products')) || [];
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const count = document.getElementById('product-count');
            
            count.textContent = products.length;
            
            if (products.length === 0) {
                grid.innerHTML = '<div class="empty-message">No hay productos en el catálogo. Agrega el primero arriba.</div>';
                return;
            }

            grid.innerHTML = '';
            products.forEach((product, index) => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${product.img}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/300x250?text=Sin+imagen'">
                        <div class="product-info">
                            <div class="product-name">${product.name}</div>
                            <div class="product-price">$${product.price}</div>
                            <div class="product-actions">
                                <button class="btn-edit" onclick="editProduct(${index})">✏️ EDITAR</button>
                                <button class="btn-delete" onclick="deleteProduct(${index})">🗑️ ELIMINAR</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        async function addProduct() {
            const name = document.getElementById('product-name').value.trim();
            const price = document.getElementById('product-price').value.trim();
            const imageInput = document.getElementById('product-camera');
            const imageUrlInput = document.getElementById('product-image').value.trim();

            if (!name || !price) {
                alert('⚠️ Por favor escribe el nombre y el precio del producto');
                return;
            }

            let imageUrl = imageUrlInput;
            if (imageInput.files && imageInput.files.length > 0) {
                try {
                    imageUrl = await convertImageToBase64(imageInput.files[0]);
                } catch (error) {
                    alert('❌ No pude procesar la foto. Intenta de nuevo.');
                    return;
                }
            }

            if (!imageUrl) {
                alert('⚠️ Por favor escribe la URL de la imagen o toma una foto');
                return;
            }

            products.push({ name, price, img: imageUrl });
            localStorage.setItem('products', JSON.stringify(products));
            renderProducts();
            alert('✅ ¡Producto guardado correctamente en la tienda!');
            document.getElementById('product-name').value = '';
            document.getElementById('product-price').value = '';
            document.getElementById('product-image').value = '';
            document.getElementById('product-camera').value = '';
            document.getElementById('image-preview').style.display = 'none';
        }

        function convertImageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function deleteProduct(index) {
            if (confirm('¿Estás segura de que quieres borrar este producto? Esta acción no se puede deshacer.')) {
                products.splice(index, 1);
                localStorage.setItem('products', JSON.stringify(products));
                renderProducts();
                alert('✅ Producto borrado de la tienda');
            }
        }

        function editProduct(index) {
            const product = products[index];
            const newName = prompt('Nuevo nombre del producto:', product.name);
            const newPrice = prompt('Nuevo precio:', product.price);
            const newImage = prompt('Nueva URL de la imagen:', product.img);

            if (newName && newPrice && newImage) {
                products[index] = { name: newName, price: newPrice, img: newImage };
                localStorage.setItem('products', JSON.stringify(products));
                renderProducts();
                alert('✅ Producto actualizado correctamente');
            }
        }

        function viewStore() {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'login.html';
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('image-preview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function showSection(section) {
            document.getElementById('section-products').style.display = section === 'products' ? 'block' : 'none';
            document.getElementById('section-settings').style.display = section === 'settings' ? 'block' : 'none';
            document.getElementById('section-orders').style.display = section === 'orders' ? 'block' : 'none';
            document.getElementById('section-returns').style.display = section === 'returns' ? 'block' : 'none';
            document.getElementById('section-customers').style.display = section === 'customers' ? 'block' : 'none';
            document.getElementById('section-dashboard').style.display = section === 'dashboard' ? 'block' : 'none';
            
            if (section === 'settings') loadSettings();
            if (section === 'orders') loadOrders();
            if (section === 'returns') loadReturns();
            if (section === 'customers') loadCustomers();
            if (section === 'dashboard') loadDashboard();
        }

        async function loadSettings() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/settings`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                const settings = await response.json();
                
                settings.forEach(setting => {
                    const input = document.getElementById(`setting-${setting.key}`);
                    if (input) input.value = setting.value;
                });
            } catch (error) {
                console.error('Error al cargar configuración:', error);
            }
        }

        async function saveSettings() {
            const settings = [
                { key: 'phone', value: document.getElementById('setting-phone').value },
                { key: 'whatsapp', value: document.getElementById('setting-whatsapp').value },
                { key: 'instagram', value: document.getElementById('setting-instagram').value },
                { key: 'facebook', value: document.getElementById('setting-facebook').value },
                { key: 'email', value: document.getElementById('setting-email').value },
                { key: 'address', value: document.getElementById('setting-address').value },
                { key: 'welcome_text', value: document.getElementById('setting-welcome').value },
                { key: 'shipping_base', value: document.getElementById('setting-shipping').value }
            ];

            try {
                for (const setting of settings) {
                    await fetch(`${SUPABASE_URL}/rest/v1/settings?key=eq.${setting.key}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ value: setting.value })
                    });
                }
                alert('✅ ¡Configuración guardada correctamente!');
            } catch (error) {
                alert('❌ No pude guardar la configuración. Verifica tu internet e intenta de nuevo.');
            }
        }

        async function loadOrders() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/orders?order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                const orders = await response.json();
                
                const grid = document.getElementById('orders-grid');
                if (orders.length === 0) {
                    grid.innerHTML = '<div class="empty-message">No hay órdenes aún.</div>';
                    return;
                }

                grid.innerHTML = orders.map(order => {
                    const products = JSON.parse(order.products);
                    const productsHtml = products.map(p => `
                        <div style="display: flex; align-items: center; margin: 10px 0; padding: 10px; background: #1a1a1a; border-radius: 8px;">
                            <img src="${p.img}" alt="${p.name}" style="width: 60px; height: 60px; object-fit: cover; border-radius: 5px; margin-right: 10px;" onerror="this.src='https://via.placeholder.com/60x60?text=Sin+imagen'">
                            <div>
                                <div style="font-weight: bold;">${p.name}</div>
                                <div style="color: #888;">$${p.price} x${p.quantity || 1}</div>
                            </div>
                        </div>
                    `).join('');

                    return `
                        <div class="product-card" style="padding: 20px;">
                            <div class="product-name">Orden #${order.id}</div>
                            <div style="margin: 10px 0; color: #888;">${new Date(order.created_at).toLocaleString()}</div>
                            <div style="margin: 5px 0;"><strong>Cliente:</strong> ${order.customer_name}</div>
                            <div style="margin: 5px 0;"><strong>Teléfono:</strong> ${order.customer_phone}</div>
                            <div style="margin: 5px 0;"><strong>Dirección:</strong> ${order.customer_address}, ${order.customer_city}</div>
                            <div style="margin: 15px 0;">
                                <strong>📦 Productos:</strong>
                                <div style="margin-top: 10px;">${productsHtml}</div>
                            </div>
                            <div style="margin: 5px 0;"><strong>Envío:</strong> ${order.shipping_company} - $${order.shipping_cost}</div>
                            <div style="margin: 5px 0;"><strong>Subtotal:</strong> $${order.subtotal}</div>
                            <div style="margin: 5px 0; font-size: 1.2rem; color: var(--accent);"><strong>Total:</strong> $${order.total}</div>
                            <div style="margin: 5px 0;"><strong>Estado:</strong> ${order.status}</div>
                            <div style="margin: 5px 0;"><strong>Pago:</strong> ${order.payment_status}</div>
                            <div class="product-actions" style="margin-top: 15px;">
                                <button class="btn-edit" onclick="updateOrderStatus(${order.id}, 'completed')">✅ Completar</button>
                                <button class="btn-edit" onclick="updateOrderStatus(${order.id}, 'processing')">📦 En Proceso</button>
                                <button class="btn-delete" onclick="updateOrderStatus(${order.id}, 'cancelled')">❌ Cancelar</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error al cargar órdenes:', error);
            }
        }

        async function updateOrderStatus(orderId, status) {
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${orderId}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status })
                });
                loadOrders();
                alert('✅ Estado del pedido actualizado');
            } catch (error) {
                alert('❌ No pude actualizar el pedido. Verifica tu internet e intenta de nuevo.');
            }
        }

        async function loadReturns() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/returns?order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                const returns = await response.json();
                
                const grid = document.getElementById('returns-grid');
                if (returns.length === 0) {
                    grid.innerHTML = '<div class="empty-message">No hay solicitudes de cambio/devolución aún.</div>';
                    return;
                }

                grid.innerHTML = returns.map(ret => `
                    <div class="product-card" style="padding: 20px;">
                        <div class="product-name">Solicitud #${ret.id}</div>
                        <div style="margin: 10px 0; color: #888;">${new Date(ret.created_at).toLocaleString()}</div>
                        <div style="margin: 5px 0;"><strong>Cliente:</strong> ${ret.customer_name}</div>
                        <div style="margin: 5px 0;"><strong>Teléfono:</strong> ${ret.customer_phone}</div>
                        <div style="margin: 5px 0;"><strong>Orden #:</strong> ${ret.order_id || 'N/A'}</div>
                        <div style="margin: 15px 0;">
                            <strong>👟 Producto:</strong>
                            <div style="display: flex; align-items: center; margin-top: 10px;">
                                <img src="${ret.product_image}" alt="${ret.product_name}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-right: 15px;" onerror="this.src='https://via.placeholder.com/80x80?text=Sin+imagen'">
                                <div>
                                    <div style="font-weight: bold;">${ret.product_name}</div>
                                </div>
                            </div>
                        </div>
                        <div style="margin: 5px 0;"><strong>Tipo:</strong> ${ret.return_type === 'change' ? '🔄 Cambio' : '💰 Devolución'}</div>
                        <div style="margin: 5px 0;"><strong>Motivo:</strong> ${ret.reason}</div>
                        <div style="margin: 5px 0;"><strong>Estado:</strong> ${ret.status}</div>
                        <div class="product-actions" style="margin-top: 15px;">
                            <button class="btn-edit" onclick="updateReturnStatus(${ret.id}, 'approved')">✅ Aprobar</button>
                            <button class="btn-edit" onclick="updateReturnStatus(${ret.id}, 'completed')">📦 Completado</button>
                            <button class="btn-delete" onclick="updateReturnStatus(${ret.id}, 'rejected')">❌ Rechazar</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error al cargar devoluciones:', error);
            }
        }

        async function updateReturnStatus(returnId, status) {
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/returns?id=eq.${returnId}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status })
                });
                loadReturns();
                alert('✅ Estado de la solicitud actualizado');
            } catch (error) {
                alert('❌ No pude actualizar la solicitud. Verifica tu internet e intenta de nuevo.');
            }
        }

        function searchProducts() {
            const searchTerm = document.getElementById('search-product').value.toLowerCase();
            const filteredProducts = products.filter(p => 
                p.name.toLowerCase().includes(searchTerm)
            );
            renderProducts(filteredProducts);
        }

        async function loadCustomers() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/orders?order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                const orders = await response.json();
                
                // Extraer clientes únicos
                const customersMap = new Map();
                orders.forEach(order => {
                    if (!customersMap.has(order.customer_phone)) {
                        customersMap.set(order.customer_phone, {
                            name: order.customer_name,
                            phone: order.customer_phone,
                            address: order.customer_address,
                            city: order.customer_city,
                            lastOrder: order.created_at,
                            totalSpent: 0,
                            orderCount: 0
                        });
                    }
                    const customer = customersMap.get(order.customer_phone);
                    customer.totalSpent += parseInt(order.total);
                    customer.orderCount += 1;
                });

                const customers = Array.from(customersMap.values());
                const grid = document.getElementById('customers-grid');
                
                if (customers.length === 0) {
                    grid.innerHTML = '<div class="empty-message">No hay clientes aún.</div>';
                    return;
                }

                grid.innerHTML = customers.map(customer => `
                    <div class="product-card" style="padding: 20px;">
                        <div class="product-name">${customer.name}</div>
                        <div style="margin: 10px 0; color: #888;">Última compra: ${new Date(customer.lastOrder).toLocaleDateString()}</div>
                        <div style="margin: 5px 0;"><strong>📞 Teléfono:</strong> ${customer.phone}</div>
                        <div style="margin: 5px 0;"><strong>📍 Dirección:</strong> ${customer.address}, ${customer.city}</div>
                        <div style="margin: 5px 0;"><strong>💰 Total gastado:</strong> $${customer.totalSpent.toLocaleString('es-CO')}</div>
                        <div style="margin: 5px 0;"><strong>📦 Pedidos:</strong> ${customer.orderCount}</div>
                        <div class="product-actions" style="margin-top: 15px;">
                            <button class="btn-edit" onclick="contactWhatsApp('${customer.phone}')">📱 Contactar por WhatsApp</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error al cargar clientes:', error);
            }
        }

        function contactWhatsApp(phone) {
            window.open(`https://wa.me/${phone}`, '_blank');
        }

        async function loadDashboard() {
            try {
                const [ordersResponse, productsResponse] = await Promise.all([
                    fetch(`${SUPABASE_URL}/rest/v1/orders`, {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }),
                    fetch(`${SUPABASE_URL}/rest/v1/products`, {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    })
                ]);

                const orders = await ordersResponse.json();
                const products = await productsResponse.json();

                // Calcular métricas
                const today = new Date().toDateString();
                const todayOrders = orders.filter(o => new Date(o.created_at).toDateString() === today);
                const todaySales = todayOrders.reduce((sum, o) => sum + parseInt(o.total), 0);

                // Productos más vendidos
                const productSales = {};
                orders.forEach(order => {
                    const orderProducts = JSON.parse(order.products);
                    orderProducts.forEach(p => {
                        if (!productSales[p.name]) {
                            productSales[p.name] = 0;
                        }
                        productSales[p.name] += p.quantity || 1;
                    });
                });

                const topProducts = Object.entries(productSales)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 5);

                const dashboard = document.getElementById('dashboard-content');
                dashboard.innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
                        <div class="product-card" style="padding: 20px; text-align: center;">
                            <div style="font-size: 3rem; margin-bottom: 10px;">💰</div>
                            <div style="font-size: 2rem; font-weight: bold; color: var(--accent);">$${todaySales.toLocaleString('es-CO')}</div>
                            <div style="color: #888;">Ventas hoy</div>
                        </div>
                        <div class="product-card" style="padding: 20px; text-align: center;">
                            <div style="font-size: 3rem; margin-bottom: 10px;">📦</div>
                            <div style="font-size: 2rem; font-weight: bold; color: var(--accent);">${todayOrders.length}</div>
                            <div style="color: #888;">Pedidos hoy</div>
                        </div>
                        <div class="product-card" style="padding: 20px; text-align: center;">
                            <div style="font-size: 3rem; margin-bottom: 10px;">👟</div>
                            <div style="font-size: 2rem; font-weight: bold; color: var(--accent);">${products.length}</div>
                            <div style="color: #888;">Stock disponible</div>
                        </div>
                        <div class="product-card" style="padding: 20px; text-align: center;">
                            <div style="font-size: 3rem; margin-bottom: 10px;">👥</div>
                            <div style="font-size: 2rem; font-weight: bold; color: var(--accent);">${new Set(orders.map(o => o.customer_phone)).size}</div>
                            <div style="color: #888;">Clientes únicos</div>
                        </div>
                    </div>
                    <div class="product-card" style="padding: 20px;">
                        <h3 style="margin-bottom: 15px;">🏆 Productos más vendidos</h3>
                        ${topProducts.length > 0 ? topProducts.map((item, index) => `
                            <div style="display: flex; justify-content: space-between; padding: 10px; background: #1a1a1a; border-radius: 8px; margin-bottom: 8px;">
                                <span>${index + 1}. ${item[0]}</span>
                                <span style="color: var(--accent); font-weight: bold;">${item[1]} vendidos</span>
                            </div>
                        `).join('') : '<p style="color: #888;">No hay ventas aún</p>'}
                    </div>
                `;
            } catch (error) {
                console.error('Error al cargar dashboard:', error);
            }
        }

        // Renderizar productos al cargar
        loadProducts();
    </script>
</body>
</html>
