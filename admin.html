<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - SNEAKER VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ff3e3e;
            --white: #ffffff;
            --gray: #111111;
            --success: #25d366;
            --danger: #dc2626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--white); 
            font-family: 'Inter', sans-serif; 
            padding: 20px;
        }

        /* HEADER */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid #333;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .admin-header h1 {
            font-size: 2rem;
            color: var(--accent);
        }

        .header-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-header {
            padding: 12px 25px;
            background: #333;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-header:hover {
            background: #555;
        }

        .btn-logout {
            background: var(--danger);
        }

        .btn-logout:hover {
            background: #ff4444;
        }

        /* FORMULARIO AGREGAR PRODUCTO */
        .add-product-section {
            background: var(--gray);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 40px;
            border: 2px solid #333;
        }

        .add-product-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: #ccc;
        }

        .form-group input {
            padding: 15px;
            font-size: 1.1rem;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 10px;
            color: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-add {
            padding: 18px 40px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add:hover {
            background: #2ecc71;
            transform: scale(1.02);
        }

        /* LISTA DE PRODUCTOS */
        .products-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--gray);
            border: 2px solid #333;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .product-card:hover {
            border-color: var(--white);
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #1a1a1a;
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 1.3rem;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .btn-delete {
            flex: 1;
            padding: 12px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #ff4444;
        }

        .btn-edit {
            flex: 1;
            padding: 12px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-edit:hover {
            background: #555;
        }

        /* MENSAJE VACÍO */
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 1.2rem;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                text-align: center;
            }

            .header-buttons {
                width: 100%;
                justify-content: center;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .btn-add {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>🔧 PANEL ADMINISTRADOR - Nancy's Sandals</h1>
        <div class="header-buttons">
            <button class="btn-header" onclick="showSection('add-product')">➕ AGREGAR PRODUCTO</button>
            <button class="btn-header" onclick="showSection('inventory')">📦 INVENTARIO</button>
            <button class="btn-header" onclick="showSection('orders')">📋 PEDIDOS</button>
            <button class="btn-header" onclick="showSection('customers')">👥 CLIENTES</button>
            <button class="btn-header" onclick="showSection('dashboard')">📊 RESUMEN</button>
            <button class="btn-header" onclick="showSection('settings')">⚙️ CONFIGURACIÓN</button>
            <button class="btn-header" onclick="showSection('returns')">🔄 DEVOLUCIONES</button>
            <button class="btn-header" onclick="viewStore()">👁️ VER TIENDA</button>
            <button class="btn-header btn-logout" onclick="logout()">🚪 CERRAR SESIÓN</button>
        </div>
    </div>

    <!-- SECCIÓN AGREGAR PRODUCTO -->
    <div id="section-add-product">
        <div class="add-product-section">
            <h2>➕ AGREGAR A TIENDA</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre del producto</label>
                    <input type="text" id="product-name" placeholder="Ej: Nike Air Max 270">
                </div>
                <div class="form-group">
                    <label>Precio (COP)</label>
                    <input type="number" id="product-price" placeholder="Ej: 450000">
                </div>
                <div class="form-group">
                    <label>URL de la imagen</label>
                    <input type="text" id="product-image" placeholder="https://ejemplo.com/imagen.jpg">
                </div>
                <div class="form-group">
                    <label>O tomar foto con cámara</label>
                    <input type="file" id="product-camera" accept="image/*" capture="environment" onchange="previewImage(event)">
                    <div id="image-preview" style="margin-top: 10px; max-width: 200px; display: none;">
                        <img id="preview-img" style="width: 100%; border-radius: 10px;">
                    </div>
                </div>
            </div>
            <button class="btn-add" onclick="addProduct()">AGREGAR PRODUCTO</button>
        </div>
    </div>

    <!-- SECCIÓN INVENTARIO -->
    <div id="section-inventory" style="display: none;">
        <div class="products-section">
            <h2>📦 INVENTARIO</h2>
            <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                <input type="text" id="search-product" placeholder="🔍 Buscar producto..." onkeyup="searchProducts()" style="flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem;">
                <button class="btn-header" onclick="loadProducts()">🔄 ACTUALIZAR</button>
            </div>
            <div id="products-grid"></div>
        </div>
    </div>

    <!-- SECCIÓN CONFIGURACIÓN -->
    <div id="section-settings" style="display: none;">
        <div class="add-product-section">
            <h2>⚙️ CONFIGURACIÓN DEL SITIO</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="setting-phone">📞 Teléfono:</label>
                    <input type="text" id="setting-phone" placeholder="573100000000">
                </div>
                <div class="form-group">
                    <label for="setting-whatsapp">💬 WhatsApp:</label>
                    <input type="text" id="setting-whatsapp" placeholder="573100000000">
                </div>
                <div class="form-group">
                    <label for="setting-instagram">📸 Instagram:</label>
                    <input type="text" id="setting-instagram" placeholder="@nancy_sneakers">
                </div>
                <div class="form-group">
                    <label for="setting-facebook">📘 Facebook:</label>
                    <input type="text" id="setting-facebook" placeholder="Nancy Sneakers">
                </div>
                <div class="form-group">
                    <label for="setting-email">📧 Email:</label>
                    <input type="text" id="setting-email" placeholder="ventas@nancysneakers.com">
                </div>
                <div class="form-group">
                    <label for="setting-address">📍 Dirección:</label>
                    <input type="text" id="setting-address" placeholder="Calle Principal #123, Colombia">
                </div>
                <div class="form-group">
                    <label for="setting-welcome">👋 Texto de bienvenida:</label>
                    <input type="text" id="setting-welcome" placeholder="Bienvenidos a Nancy Sneakers">
                </div>
                <div class="form-group">
                    <label for="setting-shipping">🚚 Costo base de envío:</label>
                    <input type="text" id="setting-shipping" placeholder="15000">
                </div>
            </div>
            <button class="btn-add" onclick="saveSettings()">GUARDAR CONFIGURACIÓN</button>
        </div>
    </div>

    <!-- SECCIÓN ÓRDENES -->
    <div id="section-orders" style="display: none;">
        <div class="products-section">
            <h2>📋 ÓRDENES DE CLIENTES</h2>
            <div id="orders-grid"></div>
        </div>
    </div>

    <!-- SECCIÓN DEVOLUCIONES -->
    <div id="section-returns" style="display: none;">
        <div class="products-section">
            <h2>🔄 SOLICITUDES DE CAMBIO/DEVOLUCIÓN</h2>
            <div id="returns-grid"></div>
        </div>
    </div>

    <!-- SECCIÓN CLIENTES -->
    <div id="section-customers" style="display: none;">
        <div class="products-section">
            <h2>👥 BASE DE DATOS DE CLIENTES</h2>
            <div id="customers-grid"></div>
        </div>
    </div>

    <!-- SECCIÓN RESUMEN -->
    <div id="section-dashboard" style="display: none;">
        <div class="products-section">
            <h2>📊 RESUMEN DEL NEGOCIO</h2>
            <div id="dashboard-content"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        // --- CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDEACln-HBhCYkLViFXohwTWx9PQTL-CjI",
            authDomain: "sandalias-nancy.firebaseapp.com",
            projectId: "sandalias-nancy",
            storageBucket: "sandalias-nancy.firebasestorage.app",
            messagingSenderId: "448671997169",
            appId: "1:448671997169:web:5b4b2521c8180ede9f5d50",
            measurementId: "G-33PC9L428C"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Verificar autenticación
        if (localStorage.getItem('admin_logged_in') !== 'true') {
            window.location.href = 'login.html';
        }

        let products = [];

        function loadProducts() {
            database.ref('products').on('value', (snapshot) => {
                products = [];
                snapshot.forEach((childSnapshot) => {
                    products.push(childSnapshot.val());
                });
                if (products.length === 0) {
                    // Fallback a productos por defecto
                    products = [
                        { name: 'Nike Air Max 270', price: '450000', img: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&q=80&w=600' },
                        { name: 'Adidas Ultraboost', price: '380000', img: 'https://images.unsplash.com/photo-1608231387042-66d1773070a5?auto=format&fit=crop&q=80&w=600' },
                        { name: 'Puma RS-X', price: '320000', img: 'https://images.unsplash.com/photo-1605348532760-6753d2c43329?auto=format&fit=crop&q=80&w=600' }
                    ];
                }
                renderProducts();
            });
        }

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const count = document.getElementById('product-count');
            
            if (!grid) {
                alert('Error: No se encontró el elemento products-grid');
                return;
            }
            
            count.textContent = products.length;
            
            if (products.length === 0) {
                grid.innerHTML = '<div class="empty-message">No hay productos en el catálogo. Agrega el primero arriba.</div>';
                return;
            }

            grid.innerHTML = '';
            products.forEach((product, index) => {
                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${product.img}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/300x250?text=Sin+imagen'">
                        <div class="product-info">
                            <div class="product-name">${product.name}</div>
                            <div class="product-price">$${product.price}</div>
                            <div class="product-actions">
                                <button class="btn-edit" onclick="editProduct(${index})">✏️ EDITAR</button>
                                <button class="btn-delete" onclick="deleteProduct(${index})">🗑️ ELIMINAR</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        async function addProduct() {
            const name = document.getElementById('product-name').value.trim();
            const price = document.getElementById('product-price').value.trim();
            const imageInput = document.getElementById('product-camera');
            const imageUrlInput = document.getElementById('product-image').value.trim();

            if (!name || !price) {
                alert('⚠️ Por favor escribe el nombre y el precio del producto');
                return;
            }

            let imageUrl = imageUrlInput;
            if (imageInput.files && imageInput.files.length > 0) {
                try {
                    imageUrl = await uploadToCloudinary(imageInput.files[0]);
                } catch (error) {
                    alert('❌ No pude subir la foto. Intenta de nuevo.');
                    return;
                }
            }

            if (!imageUrl) {
                alert('⚠️ Por favor escribe la URL de la imagen o toma una foto');
                return;
            }

            const newProductRef = database.ref('products').push();
            await newProductRef.set({
                name,
                price,
                img: imageUrl,
                id: newProductRef.key
            });

            alert('✅ ¡Producto guardado correctamente en la tienda!');
            document.getElementById('product-name').value = '';
            document.getElementById('product-price').value = '';
            document.getElementById('product-image').value = '';
            document.getElementById('product-camera').value = '';
            document.getElementById('image-preview').style.display = 'none';
        }

        async function uploadToCloudinary(file) {
            const cloudName = 'dhe7cu0y1';
            const apiKey = '663964817232755';
            const apiSecret = 'cjATtMBAsk-XIBl5ws5_ZBVNa7Q';
            const timestamp = Math.floor(Date.now() / 1000);

            const formData = new FormData();
            formData.append('file', file);
            formData.append('api_key', apiKey);
            formData.append('timestamp', timestamp);

            // Generar signature
            const signature = await generateSignature(timestamp, apiSecret);
            formData.append('signature', signature);

            const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            if (data.secure_url) {
                return data.secure_url;
            } else {
                throw new Error('Error al subir a Cloudinary: ' + (data.error?.message || 'Desconocido'));
            }
        }

        async function generateSignature(timestamp, apiSecret) {
            const stringToSign = `timestamp=${timestamp}${apiSecret}`;
            const encoder = new TextEncoder();
            const data = encoder.encode(stringToSign);
            const hashBuffer = await crypto.subtle.digest('SHA-1', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        function deleteProduct(index) {
            if (confirm('¿Estás segura de que quieres borrar este producto? Esta acción no se puede deshacer.')) {
                const product = products[index];
                database.ref(`products/${product.id}`).remove();
                alert('✅ Producto borrado de la tienda');
            }
        }

        function editProduct(index) {
            const product = products[index];
            
            // Llenar el formulario con los datos actuales
            document.getElementById('product-name').value = product.name;
            document.getElementById('product-price').value = product.price;
            document.getElementById('product-image').value = product.img;
            
            // Mostrar vista previa de la imagen actual
            const preview = document.getElementById('image-preview');
            preview.innerHTML = `<img src="${product.img}" style="max-width: 200px; max-height: 200px; object-fit: cover; border-radius: 8px;">`;
            preview.style.display = 'block';
            
            // Cambiar el botón de agregar a actualizar
            const addBtn = document.querySelector('button[onclick="addProduct()"]');
            addBtn.textContent = '💾 ACTUALIZAR PRODUCTO';
            addBtn.onclick = () => updateProduct(product.id);
            
            // Mostrar alerta
            alert('✏️ Modifica los datos y haz clic en "ACTUALIZAR PRODUCTO"');
        }

        async function updateProduct(productId) {
            const name = document.getElementById('product-name').value.trim();
            const price = document.getElementById('product-price').value.trim();
            const imageInput = document.getElementById('product-camera');
            const imageUrlInput = document.getElementById('product-image').value.trim();

            if (!name || !price) {
                alert('⚠️ Por favor escribe el nombre y el precio del producto');
                return;
            }

            let imageUrl = imageUrlInput;
            if (imageInput.files && imageInput.files.length > 0) {
                try {
                    imageUrl = await uploadToCloudinary(imageInput.files[0]);
                } catch (error) {
                    alert('❌ No pude subir la foto. Intenta de nuevo.');
                    return;
                }
            }

            if (!imageUrl) {
                alert('⚠️ Por favor escribe la URL de la imagen o toma una foto');
                return;
            }

            await database.ref(`products/${productId}`).update({
                name,
                price,
                img: imageUrl
            });

            alert('✅ ¡Producto actualizado correctamente en la tienda!');
            
            // Limpiar formulario y restaurar botón
            document.getElementById('product-name').value = '';
            document.getElementById('product-price').value = '';
            document.getElementById('product-image').value = '';
            document.getElementById('product-camera').value = '';
            document.getElementById('image-preview').style.display = 'none';
            
            // Restaurar botón de agregar
            const addBtn = document.querySelector('.btn-add');
            addBtn.textContent = '➕ AGREGAR PRODUCTO';
            addBtn.onclick = addProduct;
        }

        function viewStore() {
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'login.html';
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('image-preview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        function showSection(section) {
            document.getElementById('section-add-product').style.display = section === 'add-product' ? 'block' : 'none';
            document.getElementById('section-inventory').style.display = section === 'inventory' ? 'block' : 'none';
            document.getElementById('section-settings').style.display = section === 'settings' ? 'block' : 'none';
            document.getElementById('section-orders').style.display = section === 'orders' ? 'block' : 'none';
            document.getElementById('section-returns').style.display = section === 'returns' ? 'block' : 'none';
            document.getElementById('section-customers').style.display = section === 'customers' ? 'block' : 'none';
            document.getElementById('section-dashboard').style.display = section === 'dashboard' ? 'block' : 'none';
            
            if (section === 'inventory') loadProducts();
            if (section === 'settings') loadSettings();
            if (section === 'orders') loadOrders();
            if (section === 'returns') loadReturns();
            if (section === 'customers') loadCustomers();
            if (section === 'dashboard') loadDashboard();
        }

        function loadSettings() {
            database.ref('settings').on('value', (snapshot) => {
                const settings = snapshot.val() || {};
                document.getElementById('setting-phone').value = settings.phone || '';
                document.getElementById('setting-whatsapp').value = settings.whatsapp || '';
                document.getElementById('setting-instagram').value = settings.instagram || '';
                document.getElementById('setting-facebook').value = settings.facebook || '';
                document.getElementById('setting-email').value = settings.email || '';
                document.getElementById('setting-address').value = settings.address || '';
                document.getElementById('setting-welcome').value = settings.welcome_text || '';
                document.getElementById('setting-shipping').value = settings.shipping_base || '';
            });
        }

        function saveSettings() {
            const settings = {
                phone: document.getElementById('setting-phone').value,
                whatsapp: document.getElementById('setting-whatsapp').value,
                instagram: document.getElementById('setting-instagram').value,
                facebook: document.getElementById('setting-facebook').value,
                email: document.getElementById('setting-email').value,
                address: document.getElementById('setting-address').value,
                welcome_text: document.getElementById('setting-welcome').value,
                shipping_base: document.getElementById('setting-shipping').value
            };
            database.ref('settings').set(settings);
            alert('✅ ¡Configuración guardada correctamente!');
        }

        function loadOrders() {
            database.ref('orders').on('value', (snapshot) => {
                const orders = [];
                snapshot.forEach((childSnapshot) => {
                    orders.push(childSnapshot.val());
                });
                
                const grid = document.getElementById('orders-grid');
                if (orders.length === 0) {
                    grid.innerHTML = '<div class="empty-message">No hay pedidos aún.</div>';
                    return;
                }

                grid.innerHTML = orders.map((order, index) => `
                    <div class="product-card" style="padding: 20px;">
                        <div class="product-name">Pedido #${index + 1}</div>
                        <div style="margin: 10px 0; color: #888;">${new Date(order.created_at).toLocaleString()}</div>
                        <div style="margin: 5px 0;"><strong>Cliente:</strong> ${order.customer_name}</div>
                        <div style="margin: 5px 0;"><strong>Teléfono:</strong> ${order.customer_phone}</div>
                        <div style="margin: 5px 0;"><strong>Dirección:</strong> ${order.customer_address}, ${order.customer_city}</div>
                        <div style="margin: 5px 0;"><strong>Total:</strong> $${parseInt(order.total).toLocaleString('es-CO')}</div>
                        <div style="margin: 5px 0;"><strong>Estado:</strong> ${order.status}</div>
                        <div style="margin: 15px 0;">
                            <strong>👟 Productos:</strong>
                            ${order.products.map(p => `
                                <div style="display: flex; align-items: center; margin-top: 10px;">
                                    <img src="${p.img}" alt="${p.name}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px; margin-right: 10px;" onerror="this.src='https://via.placeholder.com/50x50?text=Sin+imagen'">
                                    <div>
                                        <div style="font-weight: bold;">${p.name}</div>
                                        <div style="font-size: 0.9rem;">Talla: ${p.talla}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="product-actions" style="margin-top: 15px;">
                            <button class="btn-edit" onclick="updateOrderStatus('${order.id}', 'pending')">⏳ Pendiente</button>
                            <button class="btn-edit" onclick="updateOrderStatus('${order.id}', 'shipped')">📦 Enviado</button>
                            <button class="btn-edit" onclick="updateOrderStatus('${order.id}', 'delivered')">✅ Entregado</button>
                        </div>
                    </div>
                `).join('');
            });
        }

        function updateOrderStatus(orderId, status) {
            database.ref(`orders/${orderId}`).update({ status });
            alert('✅ Estado del pedido actualizado');
        }

        function loadReturns() {
            database.ref('returns').on('value', (snapshot) => {
                const returns = [];
                snapshot.forEach((childSnapshot) => {
                    returns.push(childSnapshot.val());
                });
                
                const grid = document.getElementById('returns-grid');
                if (returns.length === 0) {
                    grid.innerHTML = '<div class="empty-message">No hay solicitudes de cambio/devolución aún.</div>';
                    return;
                }

                grid.innerHTML = returns.map((ret, index) => `
                    <div class="product-card" style="padding: 20px;">
                        <div class="product-name">Solicitud #${index + 1}</div>
                        <div style="margin: 10px 0; color: #888;">${new Date(ret.created_at).toLocaleString()}</div>
                        <div style="margin: 5px 0;"><strong>Cliente:</strong> ${ret.customer_name}</div>
                        <div style="margin: 5px 0;"><strong>Teléfono:</strong> ${ret.customer_phone}</div>
                        <div style="margin: 5px 0;"><strong>Orden #:</strong> ${ret.order_id || 'N/A'}</div>
                        <div style="margin: 15px 0;">
                            <strong>👟 Producto:</strong>
                            <div style="display: flex; align-items: center; margin-top: 10px;">
                                <img src="${ret.product_image}" alt="${ret.product_name}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-right: 15px;" onerror="this.src='https://via.placeholder.com/80x80?text=Sin+imagen'">
                                <div>
                                    <div style="font-weight: bold;">${ret.product_name}</div>
                                </div>
                            </div>
                        </div>
                        <div style="margin: 5px 0;"><strong>Tipo:</strong> ${ret.return_type === 'change' ? '🔄 Cambio' : '💰 Devolución'}</div>
                        <div style="margin: 5px 0;"><strong>Motivo:</strong> ${ret.reason}</div>
                        <div style="margin: 5px 0;"><strong>Estado:</strong> ${ret.status}</div>
                        <div class="product-actions" style="margin-top: 15px;">
                            <button class="btn-edit" onclick="updateReturnStatus('${ret.id}', 'approved')">✅ Aprobar</button>
                            <button class="btn-edit" onclick="updateReturnStatus('${ret.id}', 'completed')">📦 Completado</button>
                            <button class="btn-delete" onclick="updateReturnStatus('${ret.id}', 'rejected')">❌ Rechazar</button>
                        </div>
                    </div>
                `).join('');
            });
        }

        function updateReturnStatus(returnId, status) {
            database.ref(`returns/${returnId}`).update({ status });
            alert('✅ Estado de la solicitud actualizado');
        }

        function searchProducts() {
            const searchTerm = document.getElementById('search-product').value.toLowerCase();
            const filteredProducts = products.filter(p => 
                p.name.toLowerCase().includes(searchTerm)
            );
            renderProducts(filteredProducts);
        }

        function loadCustomers() {
            database.ref('orders').on('value', (snapshot) => {
                const orders = [];
                snapshot.forEach((childSnapshot) => {
                    orders.push(childSnapshot.val());
                });
                
                // Extraer clientes únicos
                const customersMap = new Map();
                orders.forEach(order => {
                    if (!customersMap.has(order.customer_phone)) {
                        customersMap.set(order.customer_phone, {
                            name: order.customer_name,
                            phone: order.customer_phone,
                            address: order.customer_address,
                            city: order.customer_city,
                            lastOrder: order.created_at,
                            totalSpent: parseInt(order.total),
                            orderCount: 1
                        });
                    } else {
                        const customer = customersMap.get(order.customer_phone);
                        customer.totalSpent += parseInt(order.total);
                        customer.orderCount += 1;
                    }
                });

                const customers = Array.from(customersMap.values());
                const grid = document.getElementById('customers-grid');
                
                if (customers.length === 0) {
                    grid.innerHTML = '<div class="empty-message">No hay clientes aún.</div>';
                    return;
                }

                grid.innerHTML = customers.map(customer => `
                    <div class="product-card" style="padding: 20px;">
                        <div class="product-name">${customer.name}</div>
                        <div style="margin: 5px 0;">📞 ${customer.phone}</div>
                        <div style="margin: 5px 0;">📍 ${customer.address}, ${customer.city}</div>
                        <div style="margin: 5px 0;">💰 Total gastado: $${customer.totalSpent.toLocaleString('es-CO')}</div>
                        <div style="margin: 5px 0;">📦 Pedidos: ${customer.orderCount}</div>
                        <div style="margin: 5px 0; color: #888;">Último pedido: ${new Date(customer.lastOrder).toLocaleDateString()}</div>
                        <button class="btn-edit" onclick="contactWhatsApp('${customer.phone}')" style="margin-top: 15px; width: 100%;">
                            📱 Contactar por WhatsApp
                        </button>
                    </div>
                `).join('');
            });
        }

        function contactWhatsApp(phone) {
            const whatsappUrl = `https://wa.me/57${phone.replace(/\D/g, '')}`;
            window.open(whatsappUrl, '_blank');
        }

        function loadDashboard() {
            database.ref('orders').on('value', (ordersSnapshot) => {
                const orders = [];
                ordersSnapshot.forEach((childSnapshot) => {
                    orders.push(childSnapshot.val());
                });
                
                const allProducts = products;

                // Calcular métricas
                const today = new Date().toDateString();
                const todayOrders = orders.filter(o => new Date(o.created_at).toDateString() === today);
                const todaySales = todayOrders.reduce((sum, o) => sum + parseInt(o.total), 0);
                const totalStock = allProducts.length;
                const uniqueCustomers = new Set(orders.map(o => o.customer_phone)).size;

                // Productos más vendidos
                const productSales = {};
                orders.forEach(order => {
                    order.products.forEach(p => {
                        productSales[p.name] = (productSales[p.name] || 0) + 1;
                    });
                });

                const topProducts = Object.entries(productSales)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 5);

                const dashboard = document.getElementById('dashboard-content');
                dashboard.innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
                        <div class="product-card" style="padding: 20px; text-align: center;">
                            <div style="font-size: 2rem;">💰</div>
                            <div style="font-size: 1.5rem; font-weight: bold; color: var(--primary);">$${todaySales.toLocaleString('es-CO')}</div>
                            <div style="color: #666;">Ventas hoy</div>
                        </div>
                        <div class="product-card" style="padding: 20px; text-align: center;">
                            <div style="font-size: 2rem;">📦</div>
                            <div style="font-size: 1.5rem; font-weight: bold; color: var(--primary);">${todayOrders.length}</div>
                            <div style="color: #666;">Pedidos hoy</div>
                        </div>
                        <div class="product-card" style="padding: 20px; text-align: center;">
                            <div style="font-size: 2rem;">👟</div>
                            <div style="font-size: 1.5rem; font-weight: bold; color: var(--primary);">${totalStock}</div>
                            <div style="color: #666;">Stock disponible</div>
                        </div>
                        <div class="product-card" style="padding: 20px; text-align: center;">
                            <div style="font-size: 2rem;">👥</div>
                            <div style="font-size: 1.5rem; font-weight: bold; color: var(--primary);">${uniqueCustomers}</div>
                            <div style="color: #666;">Clientes únicos</div>
                        </div>
                    </div>

                    <h3 style="margin-bottom: 15px;">👟 Productos más vendidos</h3>
                    ${topProducts.length > 0 ? `
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                            ${topProducts.map(([name, count]) => `
                                <div class="product-card" style="padding: 15px;">
                                    <div style="font-weight: bold;">${name}</div>
                                    <div style="color: #666;">${count} vendidos</div>
                                </div>
                            `).join('')}
                        </div>
                    ` : '<p style="color: #666;">No hay ventas aún.</p>'}
                `;
            });
        }

        // Cargar productos al inicio para que el listener esté activo
        loadProducts();
    </script>
</body>
</html>
